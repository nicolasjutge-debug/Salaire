function uid() { return Math.random().toString(36).slice(2, 10); }
function round2(n) { return Math.round(Number(n) * 100) / 100; }
function parseISO(s) { return new Date(s + "T00:00:00"); }
function toLocalISODate(d) { return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
function formatEUR(n) { return (Number(n) || 0).toLocaleString("fr-FR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €"; }
function formatJours(n) { return round2(n || 0).toLocaleString("fr-FR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function formatDateFR(s) { if (!s) return "-"; return parseISO(s).toLocaleDateString("fr-FR", { day: "2-digit", month: "long", year: "numeric" }); }
function formatMoisAnnee(key) { const parts = key.split("-"); return MOIS_FR[Number(parts[1])-1] + " " + parts[0]; }
function moisEcoules(debut, fin) {
  let m = (fin.getFullYear()-debut.getFullYear())*12 + (fin.getMonth()-debut.getMonth());
  if (fin.getDate() < debut.getDate()) m -= 1;
  return Math.max(0, m);
}
function anneesEcoulees(debut, fin) {
  let a = fin.getFullYear() - debut.getFullYear();
  const md = d => d.getMonth()*100 + d.getDate();
  if (md(fin) < md(debut)) a -= 1;
  return Math.max(0, a);
}
function debutCycle(monthDay, dateRef) {
  const parts = monthDay.split("-").map(Number);
  let start = new Date(dateRef.getFullYear(), parts[0]-1, parts[1]);
  if (start > dateRef) start = new Date(dateRef.getFullYear()-1, parts[0]-1, parts[1]);
  return start;
}
function accrualDepuis(base, dateDebut, dateRef) {
  const mois = Math.min(12, moisEcoules(dateDebut, dateRef));
  return round2((Number(base)/12) * mois);
}
function bonusAncienneteJours(annees) {
  if (annees >= 30) return 15;
  if (annees >= 20) return 10;
  if (annees >= 10) return 5;
  return 0;
}
function joursOuvresDansMois(annee, mois) {
  const debut = new Date(annee, mois-1, 1);
  const fin = new Date(annee, mois, 0);
  let count = 0;
  let d = new Date(debut);
  while (d <= fin) {
    const js = d.getDay();
    if (js !== 0 && js !== 6) count++;
    d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+1);
  }
  return count;
}

function tauxValorisationPourAnnee(annee, config) {
  const depart = Number(config.valorisationTauxDepart != null ? config.valorisationTauxDepart : 9);
  const increment = Number(config.valorisationIncrementAnnuel != null ? config.valorisationIncrementAnnuel : 1.5);
  const plafond = Number(config.valorisationPlafond != null ? config.valorisationPlafond : 15);
  if (annee <= 2025) return depart;
  const taux = depart + (annee - 2025) * increment;
  return Math.min(plafond, round2(taux));
}

function primeExperienceMensuelle(annee, mois, config) {
  const base = Number(config.baseConventionnelleClasse3) || 2089.17;
  const key = annee + "-" + String(mois).padStart(2, "0");
  const dateValorisation = config.valorisationConventionDate || "2025-08-01";
  
  let taux = tauxValorisationPourAnnee(annee, config);
  if (key >= dateValorisation.slice(0, 7)) {
    taux = tauxValorisationPourAnnee(annee, config);
  }
  return { base: base, taux: taux, montant: round2(base * taux / 100) };
}

function calculMoisDetaille(annee, mois, personne, joursPris, config, src) {
  const key = annee + "-" + String(mois).padStart(2, "0");
  const reel = src[key];
  const dateValorisation = config.valorisationConventionDate || "2025-08-01";
  
  let salaireBase = (reel && reel.salaire) ? Number(reel.salaire) : null;
  const estimeSalaire = !salaireBase;
  
  if (estimeSalaire) {
    const connues = Object.keys(src).filter(k => src[k] && src[k].salaire).sort();
    let dernierConnu = null;
    connues.forEach(k => { if (k <= key) dernierConnu = Number(src[k].salaire); });
    salaireBase = dernierConnu || 2261.76;
    
    const apresValorisation = key >= dateValorisation.slice(0, 7);
    const tauxValoAnnee = tauxValorisationPourAnnee(annee, config);
    if (apresValorisation && salaireBase) {
      salaireBase = round2(salaireBase * (1 + tauxValoAnnee / 100));
    }
  }
  
  salaireBase = salaireBase || 0;
  
  const primeExp = primeExperienceMensuelle(annee, mois, config);
  const brutEstime = round2(salaireBase * Number(config.ratioBrutSurBase || 1));
  const netFiscalEstime = round2(brutEstime * Number(config.ratioNetFiscalSurBrut || 1));
  const pasEstime = round2(netFiscalEstime * Number(config.tauxPAS || 0) / 100);
  const mutuelleConjoint = Number(config.mutuelleConjointMensuel) || 0;
  const netEstime = round2(brutEstime * Number(config.ratioNetSurBrut || 1) - mutuelleConjoint);
  const primeTransport = round2(Number(config.abonnementTransportMensuel || 0) * Number(config.remboursementTransportPct || 0) / 100);
  
  const joursOuvres = joursOuvresDansMois(annee, mois);
  const rttPrisMois = joursPris.filter(j => j.date.slice(0, 7) === key && j.type === "RTT").reduce((s, j) => s + Number(j.duree), 0);
  const cpPrisMois = joursPris.filter(j => j.date.slice(0, 7) === key && j.type === "CP").reduce((s, j) => s + Number(j.duree), 0);
  const estJourOuvre = j => { const js = parseISO(j.date).getDay(); return js !== 0 && js !== 6; };
  const rttPrisOuvre = joursPris.filter(j => j.date.slice(0, 7) === key && j.type === "RTT" && estJourOuvre(j)).reduce((s, j) => s + Number(j.duree), 0);
  const cpPrisOuvre = joursPris.filter(j => j.date.slice(0, 7) === key && j.type === "CP" && estJourOuvre(j)).reduce((s, j) => s + Number(j.duree), 0);
  const joursTravailles = Math.max(0, joursOuvres - rttPrisOuvre - cpPrisOuvre);
  const valeurTR = round2(joursTravailles * (Number(config.ticketValeur) || 0) * (Number(config.ticketPartSalarialePct) || 0) / 100);
  
  let primeNoel = 0;
  if (mois === Number(config.moisPrimeNoel)) {
    primeNoel = round2(salaireBase * Number(config.primeNoelPct || 0) / 100);
  }
  
  let primeVacances = 0;
  if (mois === Number(config.moisPrimeVacances)) {
    primeVacances = round2(salaireBase * Number(config.primeVacancesPct || 0) / 100);
  }
  
  return {
    mois, key, salaireBase, primeExp: primeExp.montant, primeNoel, primeVacances,
    brutEstime, netFiscalEstime, pasEstime, netEstime, primeTransport,
    joursOuvres, rttPrisMois, cpPrisMois, joursTravailles, ticketsEstimes: joursTravailles, valeurTR,
    estimeSalaire, tauxValoAnnee: tauxValorisationPourAnnee(annee, config),
  };
}

function estimerAnnee(personne, annee, joursPris, config) {
  const src = personne.entreesMensuelles || {};
  const moisDetail = [];
  let totalSalaire = 0, totalPrime = 0, totalPrimeNoel = 0, totalPrimeVacances = 0, totalTR = 0, totalTickets = 0;
  let totalRTT = 0, totalCP = 0, totalBrut = 0, totalNet = 0, totalNetFiscal = 0, totalPAS = 0, totalTransport = 0;
  
  for (let m = 1; m <= 12; m++) {
    const det = calculMoisDetaille(annee, m, personne, joursPris, config, src);
    moisDetail.push(det);
    
    totalSalaire += det.salaireBase;
    totalPrime += det.primeExp;
    totalPrimeNoel += det.primeNoel;
    totalPrimeVacances += det.primeVacances;
    totalTR += det.valeurTR;
    totalTickets += det.joursTravailles;
    totalRTT += det.rttPrisMois;
    totalCP += det.cpPrisMois;
    totalBrut += det.brutEstime;
    totalNet += det.netEstime;
    totalNetFiscal += det.netFiscalEstime;
    totalPAS += det.pasEstime;
    totalTransport += det.primeTransport;
  }
  
  return {
    annee, moisDetail,
    totalSalaire: round2(totalSalaire),
    totalPrime: round2(totalPrime),
    totalPrimeNoel: round2(totalPrimeNoel),
    totalPrimeVacances: round2(totalPrimeVacances),
    totalTR: round2(totalTR),
    totalTickets: totalTickets,
    totalRTT, totalCP,
    totalBrut: round2(totalBrut),
    totalNet: round2(totalNet),
    totalNetFiscal: round2(totalNetFiscal),
    totalPAS: round2(totalPAS),
    totalTransport: round2(totalTransport),
    totalGeneral: round2(totalSalaire + totalPrime + totalPrimeNoel + totalPrimeVacances + totalTransport),
  };
}

function archiverAnnee(estimation) {
  let texte = "ARCHIVE " + estimation.annee + " — Estimation salariale annuelle — Nicolas Jutge\n";
  texte += "Générée le " + formatDateFR(toLocalISODate(new Date())) + "\n";
  texte += "========================================================\n\n";
  texte += "DETAIL MENSUEL\n";
  texte += "Mois          Salaire      Prime exp.   Jours trav.  TR (€)      Total mois\n";
  estimation.moisDetail.forEach(function(m) {
    const nomMois = MOIS_FR[m.mois-1];
    texte += nomMois.padEnd(14," ") + formatEUR(m.salaireBase).padEnd(13," ") + formatEUR(m.primeExp).padEnd(13," ") + String(m.joursTravailles).padEnd(13," ") + formatEUR(m.valeurTR).padEnd(12," ") + "\n";
  });
  texte += "\n----------------------------------------\n";
  texte += "Total salaire annuel : " + formatEUR(estimation.totalSalaire) + "\n";
  texte += "Total prime d'expérience : " + formatEUR(estimation.totalPrime) + "\n";
  texte += "Total prime de Noël : " + formatEUR(estimation.totalPrimeNoel) + "\n";
  texte += "Total prime de vacances : " + formatEUR(estimation.totalPrimeVacances) + "\n";
  texte += "Total titres-restaurant : " + formatEUR(estimation.totalTR) + " (" + estimation.totalTickets + " jours)\n";
  texte += "Brut annuel : " + formatEUR(estimation.totalBrut) + " — Net : " + formatEUR(estimation.totalNet) + "\n";
  texte += "Net fiscal : " + formatEUR(estimation.totalNetFiscal) + " — PAS : " + formatEUR(estimation.totalPAS) + "\n";
  texte += "Total annuel général : " + formatEUR(estimation.totalGeneral) + "\n";
  
  const blob = new Blob([texte], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "archive-" + estimation.annee + "-nicolas.txt";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

const STORAGE_KEY = "suivi_salaire_data";
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      return { ...DEFAULT_STATE, ...parsed, config: { ...DEFAULT_STATE.config, ...(parsed.config || {}) } };
    }
  } catch (e) {}
  return DEFAULT_STATE;
}
function saveState(nextState) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(nextState)); return true; } catch (e) { return false; }
}

const BINCONFIG_KEY = "suivi_salaire_jsonbin_config";
function loadBinConfig() {
  try { const raw = localStorage.getItem(BINCONFIG_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; }
}
function saveBinConfig(cfg) {
  try { if (cfg) localStorage.setItem(BINCONFIG_KEY, JSON.stringify(cfg)); else localStorage.removeItem(BINCONFIG_KEY); } catch (e) {}
}

const JSONBIN_BASE = "https://api.jsonbin.io/v3/b";
async function jsonBinRead(cfg) {
  const res = await fetch(JSONBIN_BASE + "/" + cfg.binId + "/latest", { headers: { "X-Master-Key": cfg.apiKey } });
  if (!res.ok) throw new Error("read failed");
  return (await res.json()).record;
}
async function jsonBinWrite(cfg, record) {
  const res = await fetch(JSONBIN_BASE + "/" + cfg.binId, { method: "PUT", headers: { "Content-Type": "application/json", "X-Master-Key": cfg.apiKey }, body: JSON.stringify(record) });
  if (!res.ok) throw new Error("write failed");
  return res.json();
}
async function jsonBinCreate(apiKey, record) {
  const res = await fetch(JSONBIN_BASE, { method: "POST", headers: { "Content-Type": "application/json", "X-Master-Key": apiKey, "X-Bin-Name": "suivi-salaire" }, body: JSON.stringify(record) });
  if (!res.ok) throw new Error("create failed");
  return (await res.json()).metadata.id;
}

function Card({ children, className = "", dark = false, style = {} }) {
  const base = dark ? { backgroundColor: COLORS.ink, color: "#fff" } : { backgroundColor: "#fff", color: COLORS.ink };
  return (<div className={"rounded-2xl border p-4 " + (dark ? "border-transparent" : "border-stone-200") + " " + className} style={{ ...base, ...style }}>{children}</div>);
}

function NumberField({ label, value, onChange, step = "0.01", suffix }) {
  return (<label className="block"><span className="text-xs text-stone-500">{label}</span><div className="flex items-center gap-2 mt-1"><input type="number" step={step} value={value} onChange={e => onChange(e.target.value === "" ? "" : Number(e.target.value))} className="font-mono w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />{suffix && <span className="text-xs text-stone-400">{suffix}</span>}</div></label>);
}

function Row({ children, index = 0 }) {
  return (<div className="flex items-center justify-between rounded-lg px-3 py-2 text-sm" style={{ backgroundColor: index % 2 === 1 ? COLORS.stripe : "transparent" }}>{children}</div>);
}

function SyncPanel({ binConfig, onConnect, onDisconnect, currentState, onClose }) {
  const [apiKey, setApiKey] = useState("");
  const [binId, setBinId] = useState("");
  const [mode, setMode] = useState("create");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");

  async function handleConnect(e) {
    e.preventDefault();
    if (!apiKey.trim()) { setError("Clé API requise."); return; }
    setBusy(true); setError("");
    try {
      if (mode === "create") {
        const id = await jsonBinCreate(apiKey.trim(), currentState);
        onConnect({ apiKey: apiKey.trim(), binId: id });
      } else {
        if (!binId.trim()) { setError("Bin ID requis."); setBusy(false); return; }
        await jsonBinRead({ apiKey: apiKey.trim(), binId: binId.trim() });
        onConnect({ apiKey: apiKey.trim(), binId: binId.trim() });
      }
      onClose();
    } catch (err) {
      setError("Connexion impossible.");
    }
    setBusy(false);
  }

  if (binConfig) {
    return (<Card><p className="text-sm font-medium mb-1">Synchronisation cloud active</p><p className="text-xs text-stone-400 mb-3 font-mono">Bin ID : {binConfig.binId}</p><div className="flex gap-2"><button onClick={() => { onDisconnect(); onClose(); }} className="text-xs" style={{ color: COLORS.loss }}>Déconnecter</button><button onClick={onClose} className="text-xs" style={{ color: COLORS.accent }}>Fermer</button></div></Card>);
  }

  return (<Card><p className="text-sm font-medium mb-1">Synchroniser entre appareils (JSONBin)</p><div className="flex gap-2 mb-3"><button type="button" onClick={() => setMode("create")} className="flex-1 py-2 rounded-lg text-sm" style={{ backgroundColor: mode === "create" ? COLORS.ink : COLORS.stripe, color: mode === "create" ? "#fff" : COLORS.ink }}>Créer un bin</button><button type="button" onClick={() => setMode("existing")} className="flex-1 py-2 rounded-lg text-sm" style={{ backgroundColor: mode === "existing" ? COLORS.ink : COLORS.stripe, color: mode === "existing" ? "#fff" : COLORS.ink }}>J'ai déjà un bin</button></div><form onSubmit={handleConnect} className="space-y-3"><label className="block"><span className="text-xs text-stone-500">Clé API</span><input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} className="font-mono w-full border border-stone-300 rounded-lg px-3 py-2 text-sm mt-1" /></label>{mode === "existing" && <label className="block"><span className="text-xs text-stone-500">Bin ID</span><input type="text" value={binId} onChange={e => setBinId(e.target.value)} className="font-mono w-full border border-stone-300 rounded-lg px-3 py-2 text-sm mt-1" /></label>}{error && <p className="text-xs" style={{ color: COLORS.loss }}>{error}</p>}<div className="flex gap-2"><button type="submit" disabled={busy} className="flex-1 text-white rounded-lg py-2 text-sm font-medium disabled:opacity-50" style={{ backgroundColor: COLORS.ink }}>{busy ? "Connexion…" : "Connecter"}</button><button type="button" onClick={onClose} className="px-4 rounded-lg text-sm" style={{ backgroundColor: COLORS.stripe, color: COLORS.ink }}>Annuler</button></div></form></Card>);
}

function App() {
  const [state, setState] = useState(loadState);
  const [binConfig, setBinConfigState] = useState(loadBinConfig);
  const [showSync, setShowSync] = useState(false);
  const [syncStatus, setSyncStatus] = useState("idle");
  const [tab, setTab] = useState("dashboard");
  const [confirmReset, setConfirmReset] = useState(false);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    if (!binConfig) return;
    setSyncStatus("syncing");
    (async () => {
      try {
        const record = await jsonBinRead(binConfig);
        const merged = { ...DEFAULT_STATE, ...record, config: { ...DEFAULT_STATE.config, ...(record.config || {}) } };
        setState(merged);
        saveState(merged);
        setSyncStatus("synced");
      } catch (e) {
        setSyncStatus("error");
      }
    })();
  }, []);

  function persist(nextState) {
    setState(nextState);
    setSaving(true);
    saveState(nextState);
    if (binConfig) {
      setSyncStatus("syncing");
      jsonBinWrite(binConfig, nextState).then(() => setSyncStatus("synced")).catch(() => setSyncStatus("error"));
    }
    setTimeout(() => setSaving(false), 400);
  }

  function connecterSync(cfg) { setBinConfigState(cfg); saveBinConfig(cfg); setSyncStatus("synced"); }
  function deconnecterSync() { setBinConfigState(null); saveBinConfig(null); setSyncStatus("idle"); }

  function updateConfig(patch) { persist({ ...state, config: { ...state.config, ...patch } }); }

  const today = useMemo(() => new Date(), []);
  const nicolas = state.personnes.find(p => p.id === "nicolas") || state.personnes[0];
  
  function primeMontant(pct, mois, annee) {
    const key = annee + "-" + String(mois).padStart(2, "0");
    const entree = nicolas?.entreesMensuelles?.[key];
    const s = entree?.salaire;
    if (!s) return null;
    return round2(Number(s) * pct / 100);
  }

  const estimation2026 = useMemo(() => estimerAnnee(nicolas, 2026, state.joursPris || [], state.config), [nicolas, state.joursPris, state.config]);

  const tabs = [
    { id: "dashboard", label: "Accueil" },
    { id: "salaires", label: "Salaires" },
    { id: "estimation", label: "Estimation" },
    { id: "primes", label: "Primes" },
  ];

  return (
    <div className="min-h-screen pb-24" style={{ backgroundColor: COLORS.paper, color: COLORS.ink }}>
      <header className="px-5 pt-6 pb-5" style={{ backgroundColor: COLORS.ink, color: "#fff" }}>
        <div className="flex items-start justify-between">
          <div className="flex items-start gap-3">
            <div className="rounded-xl p-2 shrink-0 flex items-center justify-center" style={{ backgroundColor: "#2A3A34", width: 36, height: 36 }}>
              <span style={{ color: COLORS.gain, fontSize: 18, fontWeight: 600 }}>€</span>
            </div>
            <div>
              <p className="text-xs uppercase tracking-widest" style={{ color: "#8FA69B" }}>Suivi personnel</p>
              <h1 className="font-display text-2xl mt-1" style={{ fontWeight: 600 }}>Salaire, RTT & Congés</h1>
              <p className="text-sm mt-1" style={{ color: "#B7C4BC" }}>Nicolas Jutge — Classe 3</p>
            </div>
          </div>
          <div className="flex flex-col items-end gap-1.5 shrink-0">
            <button onClick={() => setShowSync(!showSync)} className="text-xs" style={{ color: "#8FA69B" }}>{binConfig ? "sync ✓" : "synchroniser"}</button>
            <button onClick={() => { if (!confirmReset) { setConfirmReset(true); setTimeout(() => setConfirmReset(false), 3000); } else { persist(DEFAULT_STATE); } }} className="text-xs" style={{ color: "#8FA69B" }}>{confirmReset ? "confirmer ?" : "réinitialiser"}</button>
          </div>
        </div>
      </header>

      <div className="px-4 pt-3">
        {showSync && <SyncPanel binConfig={binConfig} onConnect={connecterSync} onDisconnect={deconnecterSync} currentState={state} onClose={() => setShowSync(false)} />}
      </div>

      <main className="px-4 pt-5 max-w-xl mx-auto">
        {tab === "dashboard" && (
          <div className="space-y-4">
            <Card dark>
              <p className="text-xs uppercase tracking-wide" style={{ color: "#8FA69B" }}>Référence février 2026</p>
              <div className="font-mono grid grid-cols-2 gap-2 mt-2 text-sm">
                <div><p className="text-xs text-stone-400">Net payé</p><p className="font-semibold text-lg">1 776,06 €</p></div>
                <div><p className="text-xs text-stone-400">Net fiscal</p><p className="font-semibold text-lg">2 123,73 €</p></div>
                <div><p className="text-xs text-stone-400">PAS</p><p className="font-semibold text-lg">46,72 €</p></div>
                <div><p className="text-xs text-stone-400">Prime exp.</p><p className="font-semibold text-lg">188,03 €</p></div>
                <div><p className="text-xs text-stone-400">TR (nombre)</p><p className="font-semibold text-lg">18</p></div>
              </div>
            </Card>
            <Card>
              <p className="text-sm font-medium mb-3">Récapitulatif 2026</p>
              <div className="grid grid-cols-2 gap-2 text-sm">
                <Row index={0}><span>Salaire</span><span className="font-mono">{formatEUR(estimation2026.totalSalaire)}</span></Row>
                <Row index={1}><span>Prime exp.</span><span className="font-mono">{formatEUR(estimation2026.totalPrime)}</span></Row>
                <Row index={2}><span>Prime Noël</span><span className="font-mono">{formatEUR(estimation2026.totalPrimeNoel)}</span></Row>
                <Row index={3}><span>Prime vacances</span><span className="font-mono">{formatEUR(estimation2026.totalPrimeVacances)}</span></Row>
                <Row index={4}><span>TR (nombre)</span><span className="font-mono">{estimation2026.totalTickets}</span></Row>
                <Row index={5}><span>Net annuel</span><span className="font-mono font-semibold">{formatEUR(estimation2026.totalNet)}</span></Row>
              </div>
            </Card>
          </div>
        )}

        {tab === "salaires" && (
          <div className="space-y-4">
            <Card>
              <p className="text-sm font-medium mb-3">Bulletins réels — Nicolas</p>
              {HISTORIQUE.map((b, i) => (
                <Card key={i} style={{ backgroundColor: COLORS.stripe }}>
                  <div className="flex items-center justify-between mb-2">
                    <p className="text-sm font-medium">{b.periode}</p>
                    <p className="text-xs text-stone-500">{formatDateFR(b.paiement)}</p>
                  </div>
                  <div className="font-mono grid grid-cols-2 gap-y-1.5 text-xs">
                    <p>Salaire réf.</p><p className="text-right">{formatEUR(b.salaireRef)}</p>
                    <p>Net payé</p><p className="text-right font-semibold">{formatEUR(b.netPaye)}</p>
                    <p>Net fiscal</p><p className="text-right">{formatEUR(b.netFiscal)}</p>
                    <p>PAS</p><p className="text-right">{formatEUR(b.pas)}</p>
                    <p>Prime exp.</p><p className="text-right">{formatEUR(b.primeExp)}</p>
                    <p>TR (nombre)</p><p className="text-right">{b.tr}</p>
                  </div>
                  {b.note && <p className="text-xs mt-2 pt-2 border-t border-stone-300" style={{ color: COLORS.gold }}>{b.note}</p>}
                </Card>
              ))}
            </Card>
          </div>
        )}

        {tab === "estimation" && (
          <div className="space-y-4">
            <Card>
              <p className="text-sm font-medium mb-2">Estimation 2026</p>
              <div className="grid grid-cols-2 gap-2 text-xs">
                <Row index={0}><span>Salaire total</span><span className="font-mono">{formatEUR(estimation2026.totalSalaire)}</span></Row>
                <Row index={1}><span>Prime exp.</span><span className="font-mono">{formatEUR(estimation2026.totalPrime)}</span></Row>
                <Row index={2}><span>Prime Noël</span><span className="font-mono">{formatEUR(estimation2026.totalPrimeNoel)}</span></Row>
                <Row index={3}><span>Prime vacances</span><span className="font-mono">{formatEUR(estimation2026.totalPrimeVacances)}</span></Row>
                <Row index={4}><span>TR (nombre)</span><span className="font-mono">{estimation2026.totalTickets}</span></Row>
                <Row index={5}><span>TR valeur (€)</span><span className="font-mono">{formatEUR(estimation2026.totalTR)}</span></Row>
                <Row index={6}><span>Brut annuel</span><span className="font-mono">{formatEUR(estimation2026.totalBrut)}</span></Row>
                <Row index={7}><span>Net annuel</span><span className="font-mono font-semibold">{formatEUR(estimation2026.totalNet)}</span></Row>
                <Row index={8}><span>Net fiscal</span><span className="font-mono">{formatEUR(estimation2026.totalNetFiscal)}</span></Row>
                <Row index={9}><span>PAS annuel</span><span className="font-mono">{formatEUR(estimation2026.totalPAS)}</span></Row>
              </div>
            </Card>
            <Card>
              <p className="text-sm font-medium mb-2">Détail mensuel 2026</p>
              <div className="grid grid-cols-5 gap-1 text-xs text-stone-500 mb-2">
                <span>Mois</span><span>Salaire</span><span>Prime exp.</span><span>Jours trav.</span><span>TR</span>
              </div>
              {estimation2026.moisDetail.map((m, i) => (
                <div key={i} className="grid grid-cols-5 gap-1 items-center text-xs p-1" style={{ backgroundColor: i % 2 === 1 ? COLORS.stripe : "transparent" }}>
                  <span>{MOIS_FR[m.mois-1].slice(0,3)}</span>
                  <span className="font-mono">{formatEUR(m.salaireBase)}</span>
                  <span className="font-mono">{formatEUR(m.primeExp)}</span>
                  <span className="font-mono">{m.joursTravailles}</span>
                  <span className="font-mono">{m.ticketsEstimes}</span>
                </div>
              ))}
            </Card>
            <button onClick={() => archiverAnnee(estimation2026)} className="w-full py-2 rounded-lg text-sm font-medium text-white" style={{ backgroundColor: COLORS.ink }}>Archiver 2026</button>
          </div>
        )}

        {tab === "primes" && (
          <div className="space-y-4">
            <Card>
              <p className="text-sm font-medium mb-3">🎁 Prime de Noël</p>
              <div className="grid grid-cols-2 gap-3">
                <div className="rounded-lg p-3" style={{ backgroundColor: COLORS.stripe }}>
                  <p className="text-xs text-stone-500">2025</p>
                  <p className="font-mono text-lg font-semibold">{primeMontant(state.config.primeNoelPct, state.config.moisPrimeNoel, 2025) ? formatEUR(primeMontant(state.config.primeNoelPct, state.config.moisPrimeNoel, 2025)) : "—"}</p>
                </div>
                <div className="rounded-lg p-3" style={{ backgroundColor: COLORS.stripe }}>
                  <p className="text-xs text-stone-500">2026</p>
                  <p className="font-mono text-lg font-semibold">{primeMontant(state.config.primeNoelPct, state.config.moisPrimeNoel, 2026) ? formatEUR(primeMontant(state.config.primeNoelPct, state.config.moisPrimeNoel, 2026)) : "—"}</p>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-3 mt-3">
                <NumberField label="% du salaire" value={state.config.primeNoelPct} onChange={v => updateConfig({ primeNoelPct: v })} suffix="%" />
                <label className="block">
                  <span className="text-xs text-stone-500">Mois</span>
                  <select value={state.config.moisPrimeNoel} onChange={e => updateConfig({ moisPrimeNoel: Number(e.target.value) })} className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm mt-1">
                    {MOIS_FR.map((m, i) => <option key={i} value={i+1}>{m}</option>)}
                  </select>
                </label>
              </div>
            </Card>
            <Card>
              <p className="text-sm font-medium mb-3">🏖️ Prime de vacances</p>
              <div className="grid grid-cols-2 gap-3">
                <div className="rounded-lg p-3" style={{ backgroundColor: COLORS.stripe }}>
                  <p className="text-xs text-stone-500">2025</p>
                  <p className="font-mono text-lg font-semibold">{primeMontant(state.config.primeVacancesPct, state.config.moisPrimeVacances, 2025) ? formatEUR(primeMontant(state.config.primeVacancesPct, state.config.moisPrimeVacances, 2025)) : "—"}</p>
                </div>
                <div className="rounded-lg p-3" style={{ backgroundColor: COLORS.stripe }}>
                  <p className="text-xs text-stone-500">2026</p>
                  <p className="font-mono text-lg font-semibold">{primeMontant(state.config.primeVacancesPct, state.config.moisPrimeVacances, 2026) ? formatEUR(primeMontant(state.config.primeVacancesPct, state.config.moisPrimeVacances, 2026)) : "—"}</p>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-3 mt-3">
                <NumberField label="% du salaire" value={state.config.primeVacancesPct} onChange={v => updateConfig({ primeVacancesPct: v })} suffix="%" />
                <label className="block">
                  <span className="text-xs text-stone-500">Mois</span>
                  <select value={state.config.moisPrimeVacances} onChange={e => updateConfig({ moisPrimeVacances: Number(e.target.value) })} className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm mt-1">
                    {MOIS_FR.map((m, i) => <option key={i} value={i+1}>{m}</option>)}
                  </select>
                </label>
              </div>
            </Card>
          </div>
        )}
      </main>

      <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200">
        <div className="max-w-xl mx-auto grid grid-cols-4">
          {tabs.map(t => (<button key={t.id} onClick={() => setTab(t.id)} className="py-3 text-xs font-medium" style={{ color: tab === t.id ? COLORS.ink : "#A8A29E" }}>{t.label}</button>))}
        </div>
      </nav>

      {saving && (<div className="fixed top-4 right-4 text-white text-xs px-3 py-1.5 rounded-full shadow-lg" style={{ backgroundColor: COLORS.ink }}>Enregistrement…</div>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
